version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gymhelper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gymhelper
      POSTGRES_USER: gymhelper
      POSTGRES_PASSWORD: gymhelper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gymhelper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
